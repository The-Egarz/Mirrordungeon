.cc.lo{background:linear-gradient(135deg,#555,#333);color:#888}

.le{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;line-height:1.4}
.to{animation:si .3s ease,fo .5s ease 2.5s forwards;padding:10px 18px;border-radius:8px;font-size:14px;font-weight:500;border-left:3px solid var(--g);background:var(--cd);box-shadow:0 8px 30px rgba(0,0,0,.5)}

@keyframes fo{to{opacity:0;transform:translateY(-10px)}}
.mo2{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}

.tb.on{background:rgba(196,30,58,.15);border-color:var(--r);color:var(--tx)}

.pu{animation:pu2 2s ease-in-out infinite}@keyframes pu2{0%,100%{opacity:.6}50%{opacity:1}}

input:focus,select:focus,textarea:focus{border-color:var(--r)}
textarea{resize:vertical;min-height:36px}

<section id="pc" class="flex-1 overflow-y-auto p-4"></section>
<aside id="pr" class="w-72 border-l overflow-y-auto p-3 flex-shrink-0" style="border-color:var(--bd);background:var(--pn)"></aside>
</main>
<footer class="border-t px-4 py-2 overflow-y-auto flex-shrink-0" style="border-color:var(--bd);background:var(--pn);height:125px">
<div class="flex items-center gap-2 mb-1"><i class="fa-solid fa-scroll text-xs" style="color:var(--g)"></i><span class="text-xs font-bold" style="color:var(--mt)">LOG</span><button class="text-xs ml-auto" style="color:var(--mt)" onclick="LG=[];ren()">Clear</button></div>
<div id="lc" class="mo" style="color:var(--mt)"></div>
</footer>
</div>

function genFN(){

function resBuy(role,gid){
var s=null;for(var i=0;i<GS.sn.length;i++){if(GS.sn[i].pr===role&&GS.sn[i].al){s=GS.sn[i];break}}if(!s)return;
var gd=EG[gid];if(!gd)return;

GS.mn-=cost;s.eg.push(gid);aL(s.n+" bought "+gd.n+" for "+cost+".");

function resUpg(role,gid){
var s=null;for(var i=0;i<GS.sn.length;i++){if(GS.sn[i].pr===role&&GS.sn[i].al){s=GS.sn[i];break}}if(!s)return;
